security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

#    password_hashers:
#        Symfony\Component\Security\Core\User\User: bcrypt
#        App\Entity\User: bcrypt

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        users_provider:
            entity:
                class: App\Entity\User
                property: email
    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            # activate different ways to authenticate
            # https://symfony.com/doc/current/security.html#the-firewall
            lazy: true
            provider: users_provider
            logout:
                path: app_logout
                # where to redirect after logout
                # target: app_any_route

            form_login:
                # "app_login" is the name of the route created previously
                login_path: app_login
                check_path: app_login
                enable_csrf: true

            # Activate different ways to authenticate:
            # https://symfony.com/doc/current/security.html#the-firewall

            # https://symfony.com/doc/current/security/impersonating_user.html
            switch_user: true

    role_hierarchy:
        ROLE_SUPER_ADMIN:
            - ROLE_WEBMASTER
        ROLE_WEBMASTER:
            - ROLE_ADMIN_CONTACT_LIST
            - ROLE_ADMIN_CONTACT_DELETE
            - ROLE_ADMIN_USER_EDIT
            - ROLE_ADMIN_ARTICLE_LIST
            - ROLE_ADMIN_ARTICLE_EDIT
            - ROLE_ADMIN_ARTICLE_CREATE
            - ROLE_ADMIN_ARTICLE_DELETE
            - ROLE_ADMIN_PROMO_LIST
            - ROLE_ADMIN_PROMO_EDIT
            - ROLE_ADMIN_PROMO_CREATE
            - ROLE_ADMIN_PROMO_DELETE
            - ROLE_ADMIN_EVENT_LIST
            - ROLE_ADMIN_EVENT_EDIT
            - ROLE_ADMIN_EVENT_CREATE
            - ROLE_ADMIN_EVENT_DELETE
            - ROLE_ADMIN_EVENTHASPICTURE_LIST
            - ROLE_ADMIN_EVENTHASPICTURE_CREATE
            - ROLE_ADMIN_EVENTHASPICTURE_EDIT
            - ROLE_ADMIN_EVENTHASPICTURE_VIEW
            - ROLE_ADMIN_EVENTHASPICTURE_DELETE
            - ROLE_ADMIN_TESTIMONY_LIST
            - ROLE_ADMIN_TESTIMONY_EDIT
            - ROLE_ADMIN_TESTIMONY_CREATE
            - ROLE_ADMIN_TESTIMONY_DELETE
            - ROLE_ADMIN_MEDIA_LIST
            - ROLE_ADMIN_MEDIA_CREATE
            - ROLE_ADMIN_MEDIA_EDIT
            - ROLE_ADMIN_MEDIA_VIEW
            - ROLE_ADMIN_MEDIA_DELETE

    # Note: Only the *first* matching rule is applied
    access_control:
        - { path: ^/admin/login, roles: PUBLIC_ACCESS  }
        - { path: ^/admin/password, roles: PUBLIC_ACCESS  }
        - { path: ^/admin, roles: ROLE_WEBMASTER }
        - { path: ^/, roles: PUBLIC_ACCESS }

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
        providers:
            users_in_memory:
                memory:
                    users:
                        user: { password: pass, roles: ROLE_WEBMASTER }
                        admin: { password: pass, roles: ROLE_SUPER_ADMIN }
